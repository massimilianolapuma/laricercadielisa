<!DOCTYPE html>
<html lang="en" data-theme="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tab Search</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Tab Search</h1>
        <button id="langBtn" aria-label="Switch language" title="Switch language"
                data-i18n-aria-label="toggleLanguage" data-i18n-title="toggleLanguage">EN</button>
        <button id="themeBtn" aria-label="Toggle theme" data-i18n-aria-label="toggleTheme">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/>
          </svg>
        </button>
      </header>

      <div class="search-section">
        <div class="search-input-row">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
          <input
            type="text"
            id="searchInput"
            data-i18n-placeholder="searchPlaceholder"
            placeholder="Search tabs..."
            autocomplete="off"
            autofocus
          />
          <button
            id="clearSearchBtn"
            aria-label="Clear search"
            title="Clear search"
            data-i18n-aria-label="clearSearch"
            data-i18n-title="clearSearch"
            style="display:none"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
            </svg>
            <span class="sr-only" data-i18n="clearSearch">Clear search</span>
          </button>
        </div>
        <button
          id="exactMatchBtn"
          aria-pressed="false"
          title="Toggle exact word match"
          data-i18n-title="toggleExactMatch"
          data-exact-match="false"
        >
          <span data-i18n="exactMatch">Exact Match</span>
        </button>
        <div class="search-stats" style="display:none">
          <span id="tabCount">0 tabs</span>
          <span id="matchCount"></span>
        </div>
      </div>

      <div class="tabs-container">
        <div id="tabsList" class="tabs-list">
          <!-- Tabs will be populated here -->
        </div>

        <div id="noResults" class="no-results" style="display: none">
          <p data-i18n="noTabsFound">No tabs found matching your search</p>
        </div>

        <div id="loading" class="loading">
          <div class="loading-spinner"></div>
          <p data-i18n="loadingTabs">Loading tabs...</p>
        </div>
      </div>

      <footer>
        <button
          id="closeOthersBtn"
          title="Close all tabs except current"
          data-i18n-title="closeAllOtherTabsTitle"
        >
          <span data-i18n="closeOtherTabs">Close Other Tabs</span>
        </button>
        <button
          id="refreshBtn"
          title="Refresh tab list"
          data-i18n-title="refreshTitle"
        >
          <span data-i18n="refresh">Refresh</span>
        </button>
      </footer>
    </div>

    <script type="module" src="popup-init.js"></script>
  </body>
</html>
